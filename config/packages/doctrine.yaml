doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

        # IMPORTANT: You MUST configure your server version,
        # either here or in the DATABASE_URL env var (see .env file)
        # Set server_version explicitly here only if not already embedded in DATABASE_URL.
        # Not required for SQLite (version is auto-detected).
        #server_version: 'mariadb-10.6.0'
        use_savepoints: true

        # Exclude tables belonging to optional packages not present in every install.
        # SQLite: this filter is harmless (eZ tables match the positive pattern).
        schema_filter: ~^(?!nglayouts_)~
    orm:
        auto_generate_proxy_classes: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: true
        mappings:
            App:
                is_bundle: false
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'App\Entity'
                alias: App

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest.
            # NOTE: For SQLite, use a per-environment path in DATABASE_URL instead
            # (e.g. sqlite:///%kernel.project_dir%/var/data_%kernel.environment%.db)
            # and leave this suffix commented out to avoid mangling the file path.
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            auto_generate_proxy_classes: false
            proxy_dir: '%kernel.build_dir%/doctrine/orm/Proxies'
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
