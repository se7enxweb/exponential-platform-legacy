system:
    frontend_group:
        content_view:
            full:
                ng_category:
                    template: "themes/app/content/views/full/ng_category.html.twig"
                    controller: ngsite.controller.check_redirect
                    match:
                        Identifier\ContentType: ng_category
                ng_landing_page:
                    template: "themes/app/content/views/full/ng_landing_page.html.twig"
                    controller: ngsite.controller.check_redirect
                    match:
                        Identifier\ContentType: ng_landing_page
                common:
                    template: "themes/app/content/views/full/{content_type}.html.twig"
                    match:
                        Identifier\ContentType:
                            - ng_article
                            - ng_audio
                            - ng_blog_post
                            - ng_contact_form
                            - ng_frontpage
                            - ng_gallery
                            - ng_htmlbox
                            - ng_job_position
                            - ng_news
                            - ng_recipe
                            - ng_topic
                            - ng_video
                flow_page:
                    template: "@MediataEzpageFieldtype/flow_page.html.twig"
                    match:
                        Identifier\ContentType: flow_page
            payload:
                common:
                    template: "themes/app/content/views/payload/{content_type}.html.twig"
                    match:
                        Identifier\ContentType:
                            - ng_article
                form_common:
                    template: "themes/app/content/views/payload/{content_type}.html.twig"
                    controller: ngsite.controller.info_collection.proxy_form_handler
                    match:
                        Identifier\ContentType:
                            - ng_contact_form
                            - ng_job_application_form
                            - ng_lead_form
                match_all:
                    template: "themes/app/content/views/payload.html.twig"
                    match: ~
            line:
                common:
                    template: "themes/app/content/views/line/{content_type}.html.twig"
                    match:
                        Identifier\ContentType:
                            - file
                            - ng_article
                            - ng_audio
                            - ng_banner
                            - ng_blog_post
                            - ng_category
                            - ng_contact_form
                            - ng_gallery
                            - ng_landing_page
                            - ng_news
                            - ng_recipe
                            - ng_video
                match_all:
                    template: "themes/app/content/views/line.html.twig"
                    match: ~
            link_embed:
                form_common:
                    template: "themes/app/content/views/link_embed/form_common.html.twig"
                    match:
                        Identifier\ContentType:
                            - ng_contact_form
                            - ng_job_application_form
                            - ng_lead_form
                match_all:
                    template: "themes/app/content/views/link_embed.html.twig"
                    match: ~
            modal:
                form_common:
                    template: "themes/app/content/views/modal/form_common.html.twig"
                    match:
                        Identifier\ContentType:
                            - ng_contact_form
                            - ng_job_application_form
                            - ng_lead_form
                match_all:
                    template: "themes/app/content/views/modal.html.twig"
                    match: ~
            modal_trigger:
                form_common:
                    template: "themes/app/content/views/modal_trigger/form_common.html.twig"
                    match:
                        Identifier\ContentType:
                            - ng_contact_form
                            - ng_job_application_form
                            - ng_lead_form
                common:
                    template: "themes/app/content/views/modal_trigger/{content_type}.html.twig"
                    match:
                        Identifier\ContentType:
                            - ng_video
                match_all:
                    template: "themes/app/content/views/modal_trigger.html.twig"
                    match: ~
            listitem:
                common:
                    template: "themes/app/content/views/listitem/{content_type}.html.twig"
                    params:
                        with_intro: false
                    match:
                        Identifier\ContentType:
                            - file
                            - ng_article
                            - ng_audio
                            - ng_banner
                            - ng_blog_post
                            - ng_gallery
                            - ng_news
                            - ng_recipe
                            - ng_video
                match_all:
                    template: "themes/app/content/views/listitem.html.twig"
                    params:
                        with_intro: false
                    match: ~
            listitem_with_intro:
                common:
                    template: "themes/app/content/views/listitem/{content_type}.html.twig"
                    params:
                        with_intro: true
                    match:
                        Identifier\ContentType:
                            - file
                            - ng_article
                            - ng_audio
                            - ng_banner
                            - ng_blog_post
                            - ng_gallery
                            - ng_news
                            - ng_recipe
                            - ng_video
                match_all:
                    template: "themes/app/content/views/listitem.html.twig"
                    params:
                        with_intro: true
                    match: ~
            standard:
                common:
                    template: "themes/app/content/views/standard/{content_type}.html.twig"
                    params:
                        with_intro: false
                    match:
                        Identifier\ContentType:
                            - file
                            - image
                            - ng_article
                            - ng_audio
                            - ng_banner
                            - ng_blog_post
                            - ng_category
                            - ng_contact_form
                            - ng_frontpage
                            - ng_gallery
                            - ng_htmlbox
                            - ng_landing_page
                            - ng_news
                            - ng_recipe
                            - ng_video
                match_all:
                    template: "themes/app/content/views/standard.html.twig"
                    params:
                        with_intro: false
                    match: ~
            standard_with_intro:
                common:
                    template: "themes/app/content/views/standard/{content_type}.html.twig"
                    params:
                        with_intro: true
                    match:
                        Identifier\ContentType:
                            - file
                            - image
                            - ng_article
                            - ng_audio
                            - ng_banner
                            - ng_blog_post
                            - ng_category
                            - ng_contact_form
                            - ng_frontpage
                            - ng_gallery
                            - ng_htmlbox
                            - ng_landing_page
                            - ng_news
                            - ng_recipe
                            - ng_video
                match_all:
                    template: "themes/app/content/views/standard.html.twig"
                    params:
                        with_intro: true
                    match: ~
            card:
                common:
                    template: "themes/app/content/views/card/{content_type}.html.twig"
                    params:
                        with_intro: false
                    match:
                        Identifier\ContentType:
                            - ng_job_position
                match_all:
                    template: "themes/app/content/views/card.html.twig"
                    params:
                        with_intro: false
                    match: ~
            card_with_intro:
                common:
                    template: "themes/app/content/views/card/{content_type}.html.twig"
                    params:
                        with_intro: true
                    match:
                        Identifier\ContentType:
                            - ng_job_position
                match_all:
                    template: "themes/app/content/views/card.html.twig"
                    params:
                        with_intro: true
                    match: ~
            zigzag:
                common:
                    template: "themes/app/content/views/zigzag/{content_type}.html.twig"
                    match:
                        Identifier\ContentType:
                            - ng_article
                            - ng_banner
                            - ng_blog_post
                            - ng_news
                match_all:
                    template: "themes/app/content/views/zigzag.html.twig"
                    match: ~
            accordion:
                common:
                    template: "themes/app/content/views/accordion/{content_type}.html.twig"
                    match:
                        Identifier\ContentType:
                            - ng_accordion_item
                match_all:
                    template: "themes/app/content/views/accordion.html.twig"
                    match: ~
            mini:
                common:
                    template: "themes/app/content/views/mini/{content_type}.html.twig"
                    match:
                        Identifier\ContentType:
                            - file
                            - ng_article
                            - ng_audio
                            - ng_banner
                            - ng_blog_post
                            - ng_gallery
                            - ng_news
                            - ng_recipe
                            - ng_video
                match_all:
                    template: "themes/app/content/views/mini.html.twig"
                    match: ~
            overlay:
                common:
                    template: "themes/app/content/views/overlay/{content_type}.html.twig"
                    match:
                        Identifier\ContentType:
                            - ng_article
                            - ng_banner
                            - ng_blog_post
                            - ng_gallery
                            - ng_news
                            - ng_recipe
                            - ng_video
                match_all:
                    template: "themes/app/content/views/overlay.html.twig"
                    match: ~
            slide:
                common:
                    template: "themes/app/content/views/slide/{content_type}.html.twig"
                    match:
                        Identifier\ContentType:
                            - image
                            - ng_article
                            - ng_banner
                            - ng_blog_post
                            - ng_news
                            - ng_video
                match_all:
                    template: "themes/app/content/views/slide.html.twig"
                    match: ~
            gallery_thumb:
                common:
                    template: "themes/app/content/views/gallery_thumb/{content_type}.html.twig"
                    match:
                        Identifier\ContentType:
                            - image
                            - ng_article
                            - ng_banner
                            - ng_blog_post
                            - ng_news
                            - ng_video
                match_all:
                    template: "themes/app/content/views/gallery_thumb.html.twig"
                    match: ~
            gallery_grid:
                common:
                    template: "themes/app/content/views/gallery_grid/{content_type}.html.twig"
                    match:
                        Identifier\ContentType:
                            - image
                            - ng_article
                            - ng_banner
                            - ng_blog_post
                            - ng_news
                            - ng_video
                match_all:
                    template: "themes/app/content/views/gallery_grid.html.twig"
                    match: ~
            embed:
                image:
                    template: "themes/app/content/views/embed/image.html.twig"
                    controller: ngsite.controller.embed_view.image
                    match:
                        Identifier\ContentType: image
                common:
                    template: "themes/app/content/views/embed/{content_type}.html.twig"
                    match:
                        Identifier\ContentType:
                            - file
                            - image
                            - ng_article
                            - ng_audio
                            - ng_banner
                            - ng_blog_post
                            - ng_category
                            - ng_contact_form
                            - ng_frontpage
                            - ng_gallery
                            - ng_htmlbox
                            - ng_landing_page
                            - ng_news
                            - ng_shortcut
                            - ng_video
            search:
                common:
                    template: "themes/app/content/views/search/{content_type}.html.twig"
                    match:
                        Identifier\ContentType:
                            - ng_video
                match_all:
                    template: "themes/app/content/views/search.html.twig"
                    match: ~

    default:
        content_view:
            search:
                common:
                    template: "themes/app/content/views/search/{content_type}.html.twig"
                    match:
                        Identifier\ContentType:
                            - ng_video
                match_all:
                    template: "themes/app/content/views/search.html.twig"
                    match: ~
            ngcb_preview:
                common:
                    template: "themes/app/content/views/ngcb_preview/{content_type}.html.twig"
                    match:
                        Identifier\ContentType:
                            - image
                            - ng_article
                            - ng_audio
                            - ng_banner
                            - ng_blog_post
                            - ng_gallery
                            - ng_news
                            - ng_recipe
                            - ng_video

    # ╔══════════════════════════════════════════════════════════════════════════════╗
    # ║  TWIG CONTENT VIEW — site siteaccess                                         ║
    # ║  Moved from config/app/packages/ezpublish.yaml                               ║
    # ║  TO DISABLE layout_folder: prefix its 4 lines with ### and cache:clear.      ║
    # ╚══════════════════════════════════════════════════════════════════════════════╝
    site:
        content_view:
            full:
                # ── Homepage / root-location layout (loc:2, content:1) ─────────────────
                # Matched FIRST (before generic folder rule) — first-match wins.
                # To disable: prefix these 4 lines with ### and cache:clear.
                layout_folder:
                    template: "@ezdesign/content/views/full/layout_container.html.twig"
                    match:
                        Id\Location: 2
                # ── Generic folder view (all other folders) ───────────────────────────
                folder:
                    template: "@ezdesign/content/views/full/folder.html.twig"
                    match:
                        Identifier\ContentType: folder
