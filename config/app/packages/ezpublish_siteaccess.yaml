parameters:
    ngsite.admin_siteaccess_name: adminui
    ngsite.default_siteaccess_name: site

ezpublish:
    siteaccess:
        # default_siteaccess: fh_eng
        default_siteaccess: '%ngsite.default_siteaccess_name%'
        list:
            - fh_eng
            - '%ngsite.default_siteaccess_name%'
            - bold_eng
            - bold_ger
            - '%ngsite.admin_siteaccess_name%'
            - ngadminui
            - legacy_site
            - legacy_admin
        groups:
            admin_group:
                - '%ngsite.admin_siteaccess_name%'
            ngadmin_group:
                - ngadminui
                - legacy_admin
            frontend_group:
                - fh_eng
                - '%ngsite.default_siteaccess_name%'
                - bold_eng
                - bold_ger
            fh_group:
                - fh_eng
                - legacy_site
                - site
            bold_group:
                - bold_eng
                - bold_ger
    system:
        admin_group:
            design: ngadmin
            languages:
                - eng-GB
            session:
                name: eZSESSID
        ngadmin_group:
            design: ngadminui
            languages:
                - eng-GB
            session:
                name: eZSESSID
        frontend_group:
            page_layout: "themes/app/pagelayout.html.twig"
        fh_group:
            design: fh
            translation_siteaccesses:
                - fh_eng
                - '%ngsite.default_siteaccess_name%'
            content:
                tree_root:
                    location_id: '%ngsite.fh_group.locations.tree_root.id%'
            session:
                name: eZSESSID
        bold_group:
            design: bold
            translation_siteaccesses:
                - bold_eng
                - bold_ger
            content:
                tree_root:
                    location_id: '%ngsite.bold_group.locations.tree_root.id%'
            session:
                name: eZSESSID
        fh_eng:
            languages:
                - eng-GB
        site:
            languages:
                - eng-GB
            # 7x app design — developer overlay (sevenx_content_website_app_developer)
            # is first in its chain, so parts/notices.twig and any developer overrides are found first.
            # Comment out to revert to plain fh design chain:
            design: site
        bold_eng:
            languages:
                - eng-GB
        bold_ger:
            languages:
                - ger-DE

ezdesign:
    templates_theme_paths:
        sevenx_content_website_app_developer:
            - '%kernel.project_dir%/templates/themes/sevenx_content_website_app_developer'
        sevenx_content_website_app_info:
            - '%kernel.project_dir%/templates/themes/sevenx_content_website_app_info'
        sevenx_content_website_app:
            - '%kernel.project_dir%/templates/themes/sevenx_content_website_app'
        fh:
            - '%kernel.project_dir%/templates/themes/fh'
        app:
            - '%kernel.project_dir%/templates/themes/app'
        bold:
            - '%kernel.project_dir%/templates/themes/bold'
        common:
            - '%kernel.project_dir%/templates/themes/common'
        standard:
            - '%kernel.project_dir%/templates/themes/standard'

    design_list:
        bold:
            - bold
            - app
            - common
            - standard
        fh:
            - fh
            - app
            - common
            - standard
        app:
            - app
            - common
            - standard
        ngadmin:
            - ngadmin
            - admin
            - common
        admin:
            - common
        ngadminui:
            - ngadminui
            - common

        # ── Active chain for the 'site' siteaccess ──
        # To enable 7x theme: uncomment sevenx_content_website_app line below.
        # To remove all 7x themes: comment the following out. note: design 'standard' is required to boot the app default design by default. All others add features in some unique way.
        site:
            - sevenx_content_website_app_developer
            - sevenx_content_website_app_info
            - sevenx_content_website_app
            - fh
            - app
            - common
            - standard
ez_publish_legacy:
    system:
        legacy_admin:
            legacy_mode: true
        legacy_site:
            legacy_mode: true

        # ╔══════════════════════════════════════════════════════════════════════════════╗
        # ║  LEGACY PAGELAYOUT OVERRIDE — fh_group                                      ║
        # ║                                                                              ║
        # ║  This block sets the Twig pagelayout used by the legacy kernel for all       ║
        # ║  siteaccesses in fh_group (fh_eng, site).                                   ║
