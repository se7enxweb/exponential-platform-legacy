        # ║  HOW TO RE-ENABLE:                                                           ║
        # ║    Remove the  ###  prefix from the three lines below, then run:             ║
        # ║      php bin/console cache:clear --env=dev                                   ║
        # ║                                                                              ║
        # ║  CURRENTLY DISABLED — legacy kernel will use its own default pagelayout.     ║
