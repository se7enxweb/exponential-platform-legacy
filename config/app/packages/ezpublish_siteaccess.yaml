        #        view_layout: themes/sevenx-content-website-app-developer/pagelayout.html.twig
        #        ### view_layout: themes/app/pagelayout.html.twig
        #
        # ── Alternative design: 'sevenx-content-website-app' (clean front-end, no dev bar) ──
