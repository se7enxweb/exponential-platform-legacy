ezpublish:
    repositories:
        default:
            fields_groups:
                list:
                    - content
                    - meta
                    - extras
                    - link1
                    - link2
                    - item_1
                    - item_2
                    - item_3
                    - item_4
                    - item_5
                    - item_6
                    - item_7
                    - item_8

    system:
        frontend_group:
            page_layout: "@EzPublishCore/pagelayout.html.twig"
            user:
                login_template: "user/login_minimal.html.twig"
            field_templates:
                - { template: "themes/app/content/parts/content_fields.html.twig", priority: 5000 }
            search_view:
                full:
                    default:
                        template: "themes/app/pages/search.html.twig"
                        match: []

        # ╔══════════════════════════════════════════════════════════════════════════════╗
        # ║  TWIG PAGELAYOUT — site siteaccess                                           ║
        # ║                                                                              ║
        # ║  page_layout  = the Twig template that wraps ALL Twig-rendered content.      ║
        # ║  This is what the folder page (and any Twig content view) extends.           ║
        # ║  It is SEPARATE from ez_publish_legacy view_layout (legacy pages).           ║
        # ║                                                                              ║
        # ║  TO DISABLE: prefix the site: block lines with  ###  then cache:clear.      ║
        # ║                                                                              ║
        # ║  CURRENTLY ENABLED                                                           ║
        # ╚══════════════════════════════════════════════════════════════════════════════╝
        site:
            page_layout: "@ezdesign/pagelayout.html.twig"
            field_templates:
                - { template: "@ezdesign/content/field_templates.html.twig", priority: 5000 }
