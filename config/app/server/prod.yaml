parameters:
    ngsite.fh_group.site_domain: '%env(APP_DOMAIN)%'
    ngsite.bold_group.site_domain: '%env(APP_DOMAIN)%'

    ngsite.fh_group.locations.site_info.id: 65
    ngsite.bold_group.locations.site_info.id: 442

    # Homepage location IDs - use existing root node from installed dataset
    ngsite.fh_group.locations.tree_root.id: 385
    ngsite.bold_group.locations.tree_root.id: 2

    # Component locations
    ngsite.default.locations.ng_component_hero.id: 407
    ngsite.default.locations.ng_component_quote.id: 445
    ngsite.default.locations.ng_component_about.id: 413
    ngsite.default.locations.ng_component_features.id: 422
    ngsite.default.locations.ng_component_logos.id: 420
    ngsite.default.locations.ng_component_lead.id: 470

    # Site settings
    collected_info_sender: '%env(MAIL_FROM)%'
    collected_info_recipient: '%env(MAIL_TO)%'
    ngsite.default.site_settings.google_tag_manager_code: '%env(GTM_CODE)%'

ezpublish:
    siteaccess:
        match:
            URIElement: 1
