parameters:
    ngsite.fh_group.site_domain: '%env(APP_DOMAIN)%'
    ngsite.bold_group.site_domain: '%env(APP_DOMAIN)%'

    ngsite.fh_group.locations.site_info.id: 65
    ngsite.bold_group.locations.site_info.id: 442

    # Homepage location IDs - use existing root node from installed dataset
    ngsite.fh_group.locations.tree_root.id: 2
    ngsite.bold_group.locations.tree_root.id: 2

    # Component locations
    ngsite.default.locations.ng_component_hero.id: 407
    ngsite.default.locations.ng_component_quote.id: 445
    ngsite.default.locations.ng_component_about.id: 413
    ngsite.default.locations.ng_component_features.id: 422
    ngsite.default.locations.ng_component_logos.id: 420
    ngsite.default.locations.ng_component_lead.id: 470

    # Site settings
    collected_info_sender: '%env(MAIL_FROM)%'
    collected_info_recipient: '%env(MAIL_TO)%'
    ngsite.default.site_settings.google_tag_manager_code: '%env(GTM_CODE)%'

ezpublish:
    siteaccess:
        match:
            # ╔══════════════════════════════════════════════════════════════════════════════╗
            # ║  Map\Host — domain → siteaccess routing (COMMENTED OUT / INACTIVE)        ║
            # ║                                                                            ║
            # ║  When this block is active, any request whose HTTP Host header matches a   ║
            # ║  key below is sent directly to the mapped siteaccess — no URI prefix is   ║
            # ║  read or required. Host matching takes priority over URIElement when both  ║
            # ║  matchers are listed here: first matcher that returns a hit wins.          ║
            # ║                                                                            ║
            # ║  TO ACTIVATE:                                                              ║
            # ║    1. Remove the leading  #  from the Map\Host block below.               ║
            # ║    2. Ensure DNS for the domain resolves to this server.                   ║
            # ║    3. php bin/console cache:clear --env=prod                               ║
            # ║                                                                            ║
            # ║  CAUTION: once active, URLs generated for 'site' will NOT include the      ║
            # ║  /site/ URI prefix — links generated via URIElement routing will break.    ║
            # ║  Only activate one routing strategy (host OR URI) per siteaccess at once.  ║
            # ╚══════════════════════════════════════════════════════════════════════════════╝
            #
            # Map\Host:
            #     platform.demo.exponential.earth: site
            #
            # ── URI segment fallback (ACTIVE) ─────────────────────────────────────────────
            # Reads the first URI path segment as the siteaccess name.
            # e.g. https://platform.demo.exponential.earth/site/   → siteaccess 'site'
            #      https://platform.demo.exponential.earth/fh_eng/ → siteaccess 'fh_eng'
            URIElement: 1
